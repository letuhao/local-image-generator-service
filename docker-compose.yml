# Production-shaped topology. ComfyUI + MinIO live on the private `internal`
# network only — no published ports here. Dev exposes loopback ports via
# docker-compose.override.yml (copy from docker-compose.override.yml.example).

services:
  image-gen-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-gen-service:0.1.0
    environment:
      IMAGEGEN_ENV: ${IMAGEGEN_ENV:-dev}
      # Cycle 1: auth + SQLite + logging are live. Later cycles bring more env into use.
      API_KEYS: ${API_KEYS:-}
      ADMIN_API_KEYS: ${ADMIN_API_KEYS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_PROMPTS: ${LOG_PROMPTS:-false}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/jobs.db}
      COMFYUI_URL: http://comfyui:8188
      S3_INTERNAL_ENDPOINT: http://minio:9000
    volumes:
      # SQLite job store. Bind mount in dev so operators can `sqlite3 data/jobs.db`.
      # Prod deploys should replace this with a named volume.
      - ./data:/app/data
    depends_on:
      minio:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  comfyui:
    # Cycle 0 placeholder — returns a static 200 on :8188 so Compose
    # networking is testable without downloading a real GPU image yet.
    # Cycle 2 replaces this with the custom-built sidecar from
    # `docker/comfyui/Dockerfile` (pinned ComfyUI + ComfyUI-GGUF).
    image: nginx:alpine
    volumes:
      - ./docker/comfyui-placeholder/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8188/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - internal
    healthcheck:
      # curl is shipped by current minio/minio (RHEL UBI base). wget fallback
      # guards against future base-image churn where curl might be removed.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live 2>/dev/null || wget -q -O- http://127.0.0.1:9000/minio/health/live 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  minio-data:
