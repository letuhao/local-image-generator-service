# Production-shaped topology. ComfyUI + MinIO live on the private `internal`
# network only — no published ports here. Dev exposes loopback ports via
# docker-compose.override.yml (copy from docker-compose.override.yml.example).

services:
  image-gen-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-gen-service:0.1.0
    environment:
      IMAGEGEN_ENV: ${IMAGEGEN_ENV:-dev}
      # Cycle 1: auth + SQLite + logging are live. Later cycles bring more env into use.
      API_KEYS: ${API_KEYS:-}
      ADMIN_API_KEYS: ${ADMIN_API_KEYS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_PROMPTS: ${LOG_PROMPTS:-false}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/jobs.db}
      COMFYUI_URL: http://comfyui:8188
      COMFYUI_WS_URL: ws://comfyui:8188/ws
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-image-gen}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      VRAM_BUDGET_GB: ${VRAM_BUDGET_GB:-12}
      IMAGE_GEN_PUBLIC_BASE_URL: ${IMAGE_GEN_PUBLIC_BASE_URL:-http://127.0.0.1:8700}
    volumes:
      # SQLite job store. Bind mount in dev so operators can `sqlite3 data/jobs.db`.
      # Prod deploys should replace this with a named volume.
      - ./data:/app/data
      # Registry + workflows + models are read-only by the service. Cycle 3+.
      - ./config:/app/config:ro
      - ./workflows:/app/workflows:ro
      - ./models:/app/models:ro
    depends_on:
      minio:
        condition: service_healthy
      comfyui:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  comfyui:
    # Real sidecar landed in Cycle 2 — pinned ComfyUI + city96/ComfyUI-GGUF custom nodes.
    # Pin source of truth: docker/comfyui/custom-nodes.txt. The three pin locations
    # (custom-nodes.txt, Dockerfile ARG, compose args) must stay in sync on bumps.
    build:
      context: ./docker/comfyui
      args:
        COMFYUI_REF: ${COMFYUI_REF:-v0.9.2}
        COMFYUI_GGUF_REF: ${COMFYUI_GGUF_REF:-6ea2651e7df66d7585f6ffee804b20e92fb38b8a}
    image: image-gen-comfyui:0.9.2
    # Local-only tag — suppress the failing registry pull attempt every `up` does.
    pull_policy: never
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Full ComfyUI models tree — subdirs (checkpoints/, vae/, loras/) live under ./models/.
      - ./models:/workspace/ComfyUI/models:ro
      # Workflows bind-mounted so the sidecar's web UI can load them for debugging.
      - ./workflows:/workspace/ComfyUI/user/default/workflows:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8188/system_stats > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 120s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - internal
    healthcheck:
      # curl is shipped by current minio/minio (RHEL UBI base). wget fallback
      # guards against future base-image churn where curl might be removed.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live 2>/dev/null || wget -q -O- http://127.0.0.1:9000/minio/health/live 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  minio-data:
